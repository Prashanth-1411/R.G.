<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Site Settings - R.G. Ambulance Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="bg-slate-50 font-sans antialiased">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-slate-900 text-white flex flex-col shrink-0">
            <div class="p-5 border-b border-white/10">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center"><i class="fas fa-ambulance text-white"></i></div>
                    <div><h2 class="font-bold text-sm">R.G. Ambulance</h2><p class="text-[10px] text-slate-400 uppercase tracking-wider">Admin Panel</p></div>
                </div>
            </div>
            <nav id="adminNav" class="flex-1 p-4 space-y-1 overflow-y-auto"></nav>
            <div class="p-4 border-t border-white/10">
                <div class="flex items-center gap-3 px-4 py-3">
                    <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-xs font-bold" id="userAvatar">A</div>
                    <div class="flex-1 min-w-0"><p class="text-sm font-semibold truncate" id="userName">Admin</p><p class="text-[10px] text-slate-400 truncate" id="userEmail"></p></div>
                    <button onclick="adminLogout()" class="p-2 hover:bg-white/10 rounded-lg text-slate-400 hover:text-white transition-all"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
        </aside>
        <main class="flex-1 overflow-y-auto">
            <div class="p-8 max-w-2xl">
                <div class="mb-8"><h1 class="text-2xl font-bold text-slate-800">Site Settings</h1><p class="text-sm text-slate-500">Logo and global branding options</p></div>
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
                    <form id="settingsForm" class="space-y-6">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Site Logo</label>
                            <input type="file" id="logo" accept="image/*" class="w-full text-sm" />
                            <div id="logoPreview" class="hidden mt-4 p-4 bg-slate-50 rounded-xl border">
                                <img id="previewImg" class="max-h-24 object-contain" alt="Logo preview" />
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Logo Width (px)</label>
                            <input type="number" id="logo_width" min="40" max="300" value="96" class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm" />
                        </div>
                        <button type="submit" id="saveBtn" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl text-sm">Save Settings</button>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <script src="admin-common.js"></script>
    <script>
        const token = initAdminShell('settings.html');
        const API = ADMIN_API;
        const authHeaders = { 'Authorization': 'Bearer ' + token };

        async function loadSettings() {
            const data = await fetch(API + '/api/settings').then(r => r.json());
            document.getElementById('logo_width').value = data.logo_width || 96;
            if (data.logo) {
                document.getElementById('previewImg').src = API + '/' + data.logo;
                document.getElementById('logoPreview').classList.remove('hidden');
            }
        }

        document.getElementById('settingsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('logo_width', document.getElementById('logo_width').value);
            const file = document.getElementById('logo').files[0];
            if (file) formData.append('logo', file);
            const btn = document.getElementById('saveBtn');
            btn.disabled = true; btn.textContent = 'Saving...';
            await fetch(API + '/api/settings', { method: 'PUT', headers: authHeaders, body: formData });
            btn.disabled = false; btn.textContent = 'Save Settings';
            loadSettings();
            alert('Settings saved.');
        });

        loadSettings();
    </script>
</body>
</html>
