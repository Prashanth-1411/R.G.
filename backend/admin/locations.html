<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Locations - R.G. Ambulance Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="bg-slate-50 font-sans antialiased">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-slate-900 text-white flex flex-col shrink-0">
            <div class="p-5 border-b border-white/10">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center"><i class="fas fa-ambulance text-white"></i></div>
                    <div><h2 class="font-bold text-sm">R.G. Ambulance</h2><p class="text-[10px] text-slate-400 uppercase tracking-wider">Admin Panel</p></div>
                </div>
            </div>
            <nav id="adminNav" class="flex-1 p-4 space-y-1 overflow-y-auto"></nav>
            <div class="p-4 border-t border-white/10">
                <div class="flex items-center gap-3 px-4 py-3">
                    <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-xs font-bold" id="userAvatar">A</div>
                    <div class="flex-1 min-w-0"><p class="text-sm font-semibold truncate" id="userName">Admin</p><p class="text-[10px] text-slate-400 truncate" id="userEmail"></p></div>
                    <button onclick="adminLogout()" class="p-2 hover:bg-white/10 rounded-lg text-slate-400 hover:text-white transition-all"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
        </aside>
        <main class="flex-1 overflow-y-auto">
            <div class="p-8">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
                    <div><h1 class="text-2xl font-bold text-slate-800">Location Pages</h1><p class="text-sm text-slate-500">SEO location pages (ambulance service areas)</p></div>
                    <div class="flex gap-3">
                        <input type="search" id="searchInput" placeholder="Search locations..." class="px-4 py-2.5 border border-slate-200 rounded-xl text-sm w-64" oninput="loadItems()" />
                        <button onclick="openModal()" class="px-5 py-2.5 bg-blue-600 text-white font-semibold rounded-xl text-sm flex items-center gap-2"><i class="fas fa-plus"></i> Add Location</button>
                    </div>
                </div>
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <table class="w-full">
                        <thead><tr class="bg-slate-50 border-b"><th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase text-left">Area Name</th><th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase text-left">Slug</th><th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase text-left">Status</th><th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase text-right">Actions</th></tr></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                    <div id="loadingState" class="p-12 text-center text-slate-400"><i class="fas fa-spinner fa-spin text-2xl"></i></div>
                    <div id="emptyState" class="hidden p-12 text-center text-slate-400"><p class="text-sm">No locations found.</p></div>
                </div>
                <p class="text-xs text-slate-400 mt-4" id="countLabel"></p>
            </div>
        </main>
    </div>
    <div id="modal" class="fixed inset-0 z-50 bg-black/50 hidden items-center justify-center p-4" onclick="if(event.target===this)closeModal()">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-3xl p-8 max-h-[90vh] overflow-y-auto">
            <h3 class="text-lg font-bold mb-6" id="modalTitle">Add Location</h3>
            <form id="itemForm" class="space-y-4">
                <input type="hidden" id="editId" />
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-sm font-semibold mb-1">Area Name *</label><input id="name" required class="w-full px-4 py-3 border rounded-xl text-sm" /></div>
                    <div><label class="block text-sm font-semibold mb-1">Slug *</label><input id="slug" required class="w-full px-4 py-3 border rounded-xl text-sm font-mono" placeholder="ambulance-service-in-anna-nagar" /></div>
                </div>
                <div><label class="block text-sm font-semibold mb-1">Short Description</label><textarea id="description" rows="2" class="w-full px-4 py-3 border rounded-xl text-sm"></textarea></div>
                <div><label class="block text-sm font-semibold mb-1">Content HTML</label><textarea id="content_html" rows="6" class="w-full px-4 py-3 border rounded-xl text-sm font-mono"></textarea></div>
                <div><label class="block text-sm font-semibold mb-1">FAQs (JSON array)</label><textarea id="faqs" rows="4" class="w-full px-4 py-3 border rounded-xl text-sm font-mono" placeholder='[{"question":"...","answer":"..."}]'></textarea></div>
                <div><label class="block text-sm font-semibold mb-1">Meta Title</label><input id="meta_title" class="w-full px-4 py-3 border rounded-xl text-sm" /></div>
                <div><label class="block text-sm font-semibold mb-1">Meta Description</label><textarea id="meta_description" rows="2" class="w-full px-4 py-3 border rounded-xl text-sm"></textarea></div>
                <div><label class="block text-sm font-semibold mb-1">Meta Keywords</label><input id="meta_keywords" class="w-full px-4 py-3 border rounded-xl text-sm" /></div>
                <label class="flex items-center gap-2 text-sm font-semibold"><input type="checkbox" id="is_active" checked class="w-4 h-4" /> Active (visible on site)</label>
                <div class="flex gap-3"><button type="button" onclick="closeModal()" class="flex-1 py-3 border rounded-xl text-sm">Cancel</button><button type="submit" class="flex-1 py-3 bg-blue-600 text-white font-bold rounded-xl text-sm">Save</button></div>
            </form>
        </div>
    </div>
    <script src="admin-common.js"></script>
    <script>
        const token = initAdminShell('locations.html');
        const API = ADMIN_API;
        const authHeaders = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };

        async function loadItems() {
            const search = document.getElementById('searchInput').value.trim();
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('tableBody').innerHTML = '';
            try {
                const url = API + '/api/locations' + (search ? '?search=' + encodeURIComponent(search) : '');
                const items = await fetch(url).then(r => r.json());
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('countLabel').textContent = items.length + ' location page(s)';
                if (!items.length) { document.getElementById('emptyState').classList.remove('hidden'); return; }
                document.getElementById('tableBody').innerHTML = items.map(item => `
                    <tr class="border-b hover:bg-slate-50">
                        <td class="px-6 py-4 text-sm font-semibold">${item.name}</td>
                        <td class="px-6 py-4 text-xs font-mono text-slate-500">${item.slug}</td>
                        <td class="px-6 py-4"><span class="px-2 py-1 rounded-full text-xs font-bold ${item.is_active ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-500'}">${item.is_active ? 'Active' : 'Hidden'}</span></td>
                        <td class="px-6 py-4 text-right">
                            <button onclick="editItem(${item.id})" class="p-2 hover:bg-blue-100 rounded-lg text-slate-400 hover:text-blue-600"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteItem(${item.id})" class="p-2 hover:bg-red-100 rounded-lg text-slate-400 hover:text-red-600"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`).join('');
            } catch (e) { document.getElementById('loadingState').innerHTML = '<p class="text-red-500 text-sm">Failed to load.</p>'; }
        }

        function openModal(item) {
            document.getElementById('modalTitle').textContent = item ? 'Edit Location' : 'Add Location';
            document.getElementById('editId').value = item ? item.id : '';
            document.getElementById('name').value = item ? item.name : '';
            document.getElementById('slug').value = item ? item.slug : '';
            document.getElementById('description').value = item ? item.description || '' : '';
            document.getElementById('content_html').value = item ? item.content_html || '' : '';
            document.getElementById('faqs').value = item ? JSON.stringify(item.faqs || [], null, 2) : '[]';
            document.getElementById('meta_title').value = item ? item.meta_title || '' : '';
            document.getElementById('meta_description').value = item ? item.meta_description || '' : '';
            document.getElementById('meta_keywords').value = item ? item.meta_keywords || '' : '';
            document.getElementById('is_active').checked = item ? item.is_active : true;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); document.getElementById('modal').classList.remove('flex'); }
        function editItem(id) { fetch(API + '/api/locations/' + id, { headers: authHeaders }).then(r => r.json()).then(openModal); }
        async function deleteItem(id) {
            if (!confirm('Delete this location page?')) return;
            await fetch(API + '/api/locations/' + id, { method: 'DELETE', headers: authHeaders });
            loadItems();
        }
        document.getElementById('itemForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            let faqs = [];
            try { faqs = JSON.parse(document.getElementById('faqs').value || '[]'); } catch { alert('FAQs must be valid JSON'); return; }
            const body = {
                name: document.getElementById('name').value,
                slug: document.getElementById('slug').value,
                description: document.getElementById('description').value,
                content_html: document.getElementById('content_html').value,
                faqs,
                meta_title: document.getElementById('meta_title').value,
                meta_description: document.getElementById('meta_description').value,
                meta_keywords: document.getElementById('meta_keywords').value,
                is_active: document.getElementById('is_active').checked ? 1 : 0,
            };
            const url = id ? API + '/api/locations/' + id : API + '/api/locations';
            await fetch(url, { method: id ? 'PUT' : 'POST', headers: authHeaders, body: JSON.stringify(body) });
            closeModal(); loadItems();
        });
        loadItems();
    </script>
</body>
</html>
