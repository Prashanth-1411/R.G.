<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Testimonials - R.G. Ambulance Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="bg-slate-50 font-sans antialiased">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-slate-900 text-white flex flex-col shrink-0">
            <div class="p-5 border-b border-white/10">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center"><i class="fas fa-ambulance text-white"></i></div>
                    <div><h2 class="font-bold text-sm">R.G. Ambulance</h2><p class="text-[10px] text-slate-400 uppercase tracking-wider">Admin Panel</p></div>
                </div>
            </div>
            <nav id="adminNav" class="flex-1 p-4 space-y-1 overflow-y-auto"></nav>
            <div class="p-4 border-t border-white/10">
                <div class="flex items-center gap-3 px-4 py-3">
                    <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-xs font-bold" id="userAvatar">A</div>
                    <div class="flex-1 min-w-0"><p class="text-sm font-semibold truncate" id="userName">Admin</p><p class="text-[10px] text-slate-400 truncate" id="userEmail"></p></div>
                    <button onclick="adminLogout()" class="p-2 hover:bg-white/10 rounded-lg text-slate-400 hover:text-white transition-all" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
        </aside>
        <main class="flex-1 overflow-y-auto">
            <div class="p-8">
                <div class="flex items-center justify-between mb-8">
                    <div><h1 class="text-2xl font-bold text-slate-800">Testimonials</h1><p class="text-sm text-slate-500">Manage client reviews shown on the testimonials page</p></div>
                    <button onclick="openModal()" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl text-sm shadow-lg shadow-blue-200 transition-all flex items-center gap-2"><i class="fas fa-plus"></i> Add Testimonial</button>
                </div>
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <table class="w-full">
                        <thead><tr class="bg-slate-50 border-b border-slate-200">
                            <th class="text-left px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Name</th>
                            <th class="text-left px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Content</th>
                            <th class="text-left px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Status</th>
                            <th class="text-right px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Actions</th>
                        </tr></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                    <div id="loadingState" class="p-12 text-center text-slate-400"><i class="fas fa-spinner fa-spin text-2xl"></i></div>
                    <div id="emptyState" class="hidden p-12 text-center text-slate-400"><p class="text-sm">No testimonials yet.</p></div>
                </div>
            </div>
        </main>
    </div>
    <div id="modal" class="fixed inset-0 z-50 bg-black/50 hidden items-center justify-center p-4" onclick="if(event.target===this)closeModal()">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-8 max-h-[90vh] overflow-y-auto">
            <h3 class="text-lg font-bold text-slate-800 mb-6" id="modalTitle">Add Testimonial</h3>
            <form id="itemForm" class="space-y-4">
                <input type="hidden" id="editId" />
                <div><label class="block text-sm font-semibold text-slate-700 mb-1">Name *</label><input id="name" required class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm" /></div>
                <div><label class="block text-sm font-semibold text-slate-700 mb-1">Position / Location</label><input id="position" class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm" /></div>
                <div><label class="block text-sm font-semibold text-slate-700 mb-1">Review *</label><textarea id="content" required rows="4" class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm"></textarea></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-sm font-semibold text-slate-700 mb-1">Rating (1-5)</label><input type="number" id="rating" min="1" max="5" value="5" class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm" /></div>
                    <div><label class="block text-sm font-semibold text-slate-700 mb-1">Sort Order</label><input type="number" id="order" value="0" class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm" /></div>
                </div>
                <div><label class="block text-sm font-semibold text-slate-700 mb-1">Verification URL</label><input id="verification_url" class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm" placeholder="https://..." /></div>
                <label class="flex items-center gap-2 text-sm font-semibold text-slate-700"><input type="checkbox" id="is_approved" checked class="w-4 h-4" /> Approved (visible on site)</label>
                <div class="flex gap-3 pt-2">
                    <button type="button" onclick="closeModal()" class="flex-1 py-3 border rounded-xl text-sm">Cancel</button>
                    <button type="submit" id="saveBtn" class="flex-1 py-3 bg-blue-600 text-white font-bold rounded-xl text-sm">Save</button>
                </div>
            </form>
        </div>
    </div>
    <script src="admin-common.js"></script>
    <script>
        const token = initAdminShell('testimonials.html');
        const API = ADMIN_API;
        const authHeaders = { 'Authorization': 'Bearer ' + token };

        async function loadItems() {
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('tableBody').innerHTML = '';
            try {
                const items = await fetch(API + '/api/testimonials').then(r => r.json());
                document.getElementById('loadingState').classList.add('hidden');
                if (!items.length) { document.getElementById('emptyState').classList.remove('hidden'); return; }
                document.getElementById('tableBody').innerHTML = items.map(item => `
                    <tr class="border-b border-slate-100 hover:bg-slate-50">
                        <td class="px-6 py-4"><p class="font-semibold text-sm">${item.name}</p><p class="text-xs text-slate-500">${item.position || ''}</p></td>
                        <td class="px-6 py-4 text-sm text-slate-600 max-w-md truncate">${item.content}</td>
                        <td class="px-6 py-4"><span class="px-2 py-1 rounded-full text-xs font-bold ${item.is_approved ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-500'}">${item.is_approved ? 'Approved' : 'Hidden'}</span></td>
                        <td class="px-6 py-4 text-right">
                            <button onclick="editItem(${item.id})" class="p-2 hover:bg-blue-100 rounded-lg text-slate-400 hover:text-blue-600"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteItem(${item.id})" class="p-2 hover:bg-red-100 rounded-lg text-slate-400 hover:text-red-600"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`).join('');
            } catch (e) { document.getElementById('loadingState').innerHTML = '<p class="text-red-500 text-sm">Failed to load.</p>'; }
        }

        function openModal(item) {
            document.getElementById('modalTitle').textContent = item ? 'Edit Testimonial' : 'Add Testimonial';
            document.getElementById('editId').value = item ? item.id : '';
            document.getElementById('name').value = item ? item.name : '';
            document.getElementById('position').value = item ? item.position || '' : '';
            document.getElementById('content').value = item ? item.content : '';
            document.getElementById('rating').value = item ? item.rating : 5;
            document.getElementById('order').value = item ? item.order : 0;
            document.getElementById('verification_url').value = item ? item.verification_url || '' : '';
            document.getElementById('is_approved').checked = item ? item.is_approved : true;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); document.getElementById('modal').classList.remove('flex'); }
        function editItem(id) { fetch(API + '/api/testimonials/' + id, { headers: authHeaders }).then(r => r.json()).then(openModal); }
        async function deleteItem(id) {
            if (!confirm('Delete this testimonial?')) return;
            await fetch(API + '/api/testimonials/' + id, { method: 'DELETE', headers: authHeaders });
            loadItems();
        }
        document.getElementById('itemForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const body = {
                name: document.getElementById('name').value,
                position: document.getElementById('position').value,
                content: document.getElementById('content').value,
                rating: document.getElementById('rating').value,
                order: document.getElementById('order').value,
                verification_url: document.getElementById('verification_url').value,
                is_approved: document.getElementById('is_approved').checked ? 1 : 0,
            };
            const url = id ? API + '/api/testimonials/' + id : API + '/api/testimonials';
            await fetch(url, { method: id ? 'PUT' : 'POST', headers: { ...authHeaders, 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
            closeModal(); loadItems();
        });
        loadItems();
    </script>
</body>
</html>
