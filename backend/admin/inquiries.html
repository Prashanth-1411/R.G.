<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inquiries - R.G. Ambulance Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="bg-slate-50 font-sans antialiased">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-slate-900 text-white flex flex-col shrink-0">
            <div class="p-5 border-b border-white/10">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center"><i class="fas fa-ambulance text-white"></i></div>
                    <div><h2 class="font-bold text-sm">R.G. Ambulance</h2><p class="text-[10px] text-slate-400 uppercase tracking-wider">Admin Panel</p></div>
                </div>
            </div>
            <nav id="adminNav" class="flex-1 p-4 space-y-1 overflow-y-auto"></nav>
            <div class="p-4 border-t border-white/10">
                <div class="flex items-center gap-3 px-4 py-3">
                    <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-xs font-bold" id="userAvatar">A</div>
                    <div class="flex-1 min-w-0"><p class="text-sm font-semibold truncate" id="userName">Admin</p><p class="text-[10px] text-slate-400 truncate" id="userEmail"></p></div>
                    <button onclick="adminLogout()" class="p-2 hover:bg-white/10 rounded-lg text-slate-400 hover:text-white transition-all"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
        </aside>
        <main class="flex-1 overflow-y-auto">
            <div class="p-8">
                <div class="mb-8"><h1 class="text-2xl font-bold text-slate-800">Contact Inquiries</h1><p class="text-sm text-slate-500">Messages submitted from the contact form</p></div>
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <table class="w-full">
                        <thead><tr class="bg-slate-50 border-b"><th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase text-left">Contact</th><th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase text-left">Message</th><th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase text-left">Status</th><th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase text-right">Actions</th></tr></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                    <div id="loadingState" class="p-12 text-center text-slate-400"><i class="fas fa-spinner fa-spin text-2xl"></i></div>
                    <div id="emptyState" class="hidden p-12 text-center text-slate-400"><p class="text-sm">No inquiries yet.</p></div>
                </div>
            </div>
        </main>
    </div>
    <script src="admin-common.js"></script>
    <script>
        const token = initAdminShell('inquiries.html');
        const API = ADMIN_API;
        const authHeaders = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };

        async function loadItems() {
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('tableBody').innerHTML = '';
            try {
                const items = await fetch(API + '/api/contact-leads', { headers: authHeaders }).then(r => r.json());
                document.getElementById('loadingState').classList.add('hidden');
                if (!items.length) { document.getElementById('emptyState').classList.remove('hidden'); return; }
                document.getElementById('tableBody').innerHTML = items.map(item => `
                    <tr class="border-b hover:bg-slate-50 align-top">
                        <td class="px-6 py-4">
                            <p class="font-semibold text-sm">${item.name}</p>
                            <p class="text-xs text-slate-500">${item.email}</p>
                            <p class="text-xs text-slate-500">${item.phone}</p>
                            <p class="text-xs text-slate-400 mt-1">${new Date(item.created_at).toLocaleString()}</p>
                        </td>
                        <td class="px-6 py-4 text-sm text-slate-600 max-w-md">
                            <p class="text-xs font-bold text-slate-500 mb-1">${item.requirements || 'General'}</p>
                            <p>${item.message}</p>
                        </td>
                        <td class="px-6 py-4">
                            <select onchange="updateStatus(${item.id}, this.value)" class="text-xs border rounded-lg px-2 py-1">
                                <option value="new" ${item.status === 'new' ? 'selected' : ''}>New</option>
                                <option value="contacted" ${item.status === 'contacted' ? 'selected' : ''}>Contacted</option>
                                <option value="resolved" ${item.status === 'resolved' ? 'selected' : ''}>Resolved</option>
                            </select>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <button onclick="deleteItem(${item.id})" class="p-2 hover:bg-red-100 rounded-lg text-slate-400 hover:text-red-600"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`).join('');
            } catch (e) { document.getElementById('loadingState').innerHTML = '<p class="text-red-500 text-sm">Failed to load.</p>'; }
        }

        async function updateStatus(id, status) {
            await fetch(API + '/api/contact-leads/' + id, { method: 'PUT', headers: authHeaders, body: JSON.stringify({ status }) });
        }
        async function deleteItem(id) {
            if (!confirm('Delete this inquiry?')) return;
            await fetch(API + '/api/contact-leads/' + id, { method: 'DELETE', headers: authHeaders });
            loadItems();
        }
        loadItems();
    </script>
</body>
</html>
