<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hero Sliders - R.G. Ambulance Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="bg-slate-50 font-sans antialiased">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-slate-900 text-white flex flex-col shrink-0">
            <div class="p-5 border-b border-white/10">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center"><i class="fas fa-ambulance text-white"></i></div>
                    <div><h2 class="font-bold text-sm">R.G. Ambulance</h2><p class="text-[10px] text-slate-400 uppercase tracking-wider">Admin Panel</p></div>
                </div>
            </div>
            <nav id="adminNav" class="flex-1 p-4 space-y-1 overflow-y-auto"></nav>
            <div class="p-4 border-t border-white/10">
                <div class="flex items-center gap-3 px-4 py-3">
                    <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-xs font-bold" id="userAvatar">A</div>
                    <div class="flex-1 min-w-0"><p class="text-sm font-semibold truncate" id="userName">Admin</p><p class="text-[10px] text-slate-400 truncate" id="userEmail"></p></div>
                    <button onclick="adminLogout()" class="p-2 hover:bg-white/10 rounded-lg text-slate-400 hover:text-white transition-all" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto">
            <div class="p-8">
                <div class="flex items-center justify-between mb-8">
                    <div><h1 class="text-2xl font-bold text-slate-800">Hero Sliders</h1><p class="text-sm text-slate-500">Manage the hero banner slider images and text</p></div>
                    <button onclick="openModal()" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl text-sm shadow-lg shadow-blue-200 transition-all flex items-center gap-2"><i class="fas fa-plus"></i> Add Slide</button>
                </div>

                <div class="grid gap-6" id="sliderGrid"></div>
                <div id="loadingState" class="p-12 text-center text-slate-400"><i class="fas fa-spinner fa-spin text-2xl"></i><p class="mt-2 text-sm">Loading sliders...</p></div>
                <div id="emptyState" class="hidden p-12 text-center text-slate-400"><i class="fas fa-images text-4xl mb-3"></i><p class="text-sm">No slides yet. Click "Add Slide" to create one.</p></div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Modal -->
    <div id="modal" class="fixed inset-0 z-50 bg-black/50 hidden items-center justify-center p-4" onclick="if(event.target===this)closeModal()">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-8 max-h-[90vh] overflow-y-auto">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-lg font-bold text-slate-800" id="modalTitle">Add Slide</h3>
                <button onclick="closeModal()" class="p-2 hover:bg-slate-100 rounded-lg transition-all"><i class="fas fa-times text-slate-400"></i></button>
            </div>
            <form id="sliderForm" class="space-y-5">
                <input type="hidden" id="editId" />
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Title <span class="text-red-500">*</span></label>
                    <input type="text" id="title" required class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none text-sm" placeholder="Hero slide title" />
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Subtitle / Description</label>
                    <input type="text" id="subtitle" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none text-sm" placeholder="Optional subtitle" />
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Button Text</label>
                    <input type="text" id="button_text" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none text-sm" placeholder="e.g. Book Ambulance" />
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Button Link</label>
                    <input type="text" id="button_link" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none text-sm" placeholder="e.g. #booking-sec or /funeral-services" />
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Image <span class="text-red-500">*</span></label>
                    <input type="file" id="image" accept="image/*" class="w-full text-sm text-slate-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 transition-all" />
                    <div id="imagePreview" class="hidden mt-3 relative rounded-xl overflow-hidden">
                        <img id="previewImg" class="w-full h-40 object-cover rounded-xl" />
                        <button type="button" onclick="clearImage()" class="absolute top-2 right-2 p-1.5 bg-white/90 rounded-lg text-slate-600 hover:bg-white shadow"><i class="fas fa-times text-xs"></i></button>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Sort Order</label>
                    <input type="number" id="order" min="0" value="0" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none text-sm" />
                </div>
                <div>
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="checkbox" id="active" checked class="w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-200" />
                        <span class="text-sm font-semibold text-slate-700">Active</span>
                    </label>
                </div>
                <div class="pt-2 flex gap-3">
                    <button type="button" onclick="closeModal()" class="flex-1 py-3 border border-slate-200 text-slate-600 font-semibold rounded-xl text-sm hover:bg-slate-50 transition-all">Cancel</button>
                    <button type="submit" id="saveBtn" class="flex-1 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl text-sm shadow-lg shadow-blue-200 transition-all">Save Slide</button>
                </div>
            </form>
        </div>
    </div>

    <script src="admin-common.js"></script>
    <script>
        const token = initAdminShell('sliders.html');
        const API = ADMIN_API;
        const authHeaders = { 'Authorization': 'Bearer ' + token };

        async function loadItems() {
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('sliderGrid').innerHTML = '';
            try {
                const res = await fetch(API + '/api/sliders');
                const items = await res.json();
                document.getElementById('loadingState').classList.add('hidden');
                if (!items.length) { document.getElementById('emptyState').classList.remove('hidden'); return; }
                document.getElementById('sliderGrid').innerHTML = items.sort((a,b) => (a.sort_order||0) - (b.sort_order||0)).map(item => `
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col sm:flex-row">
                        <div class="sm:w-72 h-48 sm:h-auto bg-slate-100 shrink-0">
                            <img src="${API}/${item.image || item.image_url}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/400x300?text=No+Image'" />
                        </div>
                        <div class="p-6 flex-1 flex flex-col justify-between">
                            <div>
                                <h3 class="font-bold text-slate-800 text-lg">${item.title}</h3>
                                ${item.subtitle || item.description ? `<p class="text-sm text-slate-500 mt-1">${item.subtitle || item.description}</p>` : ''}
                            ${item.button_text ? `<p class="text-xs text-slate-400 mt-2"><i class="fas fa-link mr-1"></i>${item.button_text} → ${item.button_link || '#'}</p>` : ''}
                                <div class="flex gap-3 mt-3">
                                    <span class="px-2.5 py-1 text-xs font-bold rounded-full ${item.is_active ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-500'}">
                                        ${item.is_active ? 'Active' : 'Inactive'}
                                    </span>
                                    <span class="px-2.5 py-1 text-xs font-bold rounded-full bg-blue-100 text-blue-700">
                                        Order: ${item.sort_order || 0}
                                    </span>
                                </div>
                            </div>
                            <div class="flex gap-2 mt-4">
                                <button onclick="editItem(${item.id})" class="px-4 py-2 bg-blue-50 hover:bg-blue-100 text-blue-600 font-semibold rounded-lg text-xs transition-all"><i class="fas fa-edit mr-1"></i> Edit</button>
                                <button onclick="deleteItem(${item.id})" class="px-4 py-2 bg-red-50 hover:bg-red-100 text-red-600 font-semibold rounded-lg text-xs transition-all"><i class="fas fa-trash mr-1"></i> Delete</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('loadingState').innerHTML = '<p class="text-red-500 text-sm">Failed to load. Make sure the backend server is running on port 5000.</p>';
            }
        }

        function openModal(item) {
            document.getElementById('modalTitle').textContent = item ? 'Edit Slide' : 'Add Slide';
            document.getElementById('editId').value = item ? item.id : '';
            document.getElementById('title').value = item ? item.title : '';
            document.getElementById('subtitle').value = item ? (item.subtitle || item.description || '') : '';
            document.getElementById('button_text').value = item ? (item.button_text || '') : '';
            document.getElementById('button_link').value = item ? (item.button_link || '') : '';
            document.getElementById('order').value = item ? item.sort_order || 0 : 0;
            document.getElementById('active').checked = item ? item.is_active : true;
            document.getElementById('image').value = '';
            document.getElementById('imagePreview').classList.add('hidden');
            if (item && (item.image || item.image_url)) {
                document.getElementById('previewImg').src = API + '/' + (item.image || item.image_url);
                document.getElementById('imagePreview').classList.remove('hidden');
            }
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }

        function editItem(id) {
            fetch(API + '/api/sliders/' + id, { headers: authHeaders })
                .then(r => r.json()).then(item => openModal(item));
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('modal').classList.remove('flex');
            document.getElementById('sliderForm').reset();
            document.getElementById('imagePreview').classList.add('hidden');
            document.getElementById('image').value = '';
        }

        function clearImage() { document.getElementById('imagePreview').classList.add('hidden'); document.getElementById('image').value = ''; }

        document.getElementById('sliderForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const formData = new FormData();
            formData.append('title', document.getElementById('title').value);
            formData.append('subtitle', document.getElementById('subtitle').value);
            formData.append('button_text', document.getElementById('button_text').value);
            formData.append('button_link', document.getElementById('button_link').value);
            formData.append('sort_order', parseInt(document.getElementById('order').value) || 0);
            formData.append('is_active', document.getElementById('active').checked ? '1' : '0');
            const fileInput = document.getElementById('image');
            if (fileInput.files[0]) { formData.append('image', fileInput.files[0]); }

            const url = id ? API + '/api/sliders/' + id : API + '/api/sliders';
            const method = id ? 'PUT' : 'POST';
            const btn = document.getElementById('saveBtn');
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            try {
                await fetch(url, { method, headers: authHeaders, body: formData });
                closeModal(); loadItems();
            } catch (e) { alert('Error saving slide'); }
            btn.disabled = false; btn.innerHTML = 'Save Slide';
        });

        async function deleteItem(id) {
            if (!confirm('Delete this slide?')) return;
            try { await fetch(API + '/api/sliders/' + id, { method: 'DELETE', headers: authHeaders }); loadItems(); }
            catch (e) { alert('Error deleting slide'); }
        }

        function logout() { localStorage.removeItem('token'); localStorage.removeItem('user'); window.location.href = 'index.html'; }

        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (user.name) { document.getElementById('userName').textContent = user.name; document.getElementById('userEmail').textContent = user.email; document.getElementById('userAvatar').textContent = user.name.charAt(0).toUpperCase(); }

        loadItems();
    </script>
</body>
</html>
