<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Navbar - R.G. Ambulance Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="bg-slate-50 font-sans antialiased">
    <div class="flex h-screen overflow-hidden">
        <aside id="sidebar" class="w-64 bg-slate-900 text-white flex flex-col shrink-0">
            <div class="p-5 border-b border-white/10">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center">
                        <i class="fas fa-ambulance text-white"></i>
                    </div>
                    <div>
                        <h2 class="font-bold text-sm">R.G. Ambulance</h2>
                        <p class="text-[10px] text-slate-400 uppercase tracking-wider">Admin Panel</p>
                    </div>
                </div>
            </div>
            <nav id="adminNav" class="flex-1 p-4 space-y-1 overflow-y-auto"></nav>
            <div class="p-4 border-t border-white/10">
                <div class="flex items-center gap-3 px-4 py-3">
                    <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-xs font-bold" id="userAvatar">A</div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-semibold truncate" id="userName">Admin</p>
                        <p class="text-[10px] text-slate-400 truncate" id="userEmail"></p>
                    </div>
                    <button onclick="adminLogout()" class="p-2 hover:bg-white/10 rounded-lg text-slate-400 hover:text-white transition-all" title="Logout">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto">
            <div class="p-8">
                <div class="flex items-center justify-between mb-8">
                    <div>
                        <h1 class="text-2xl font-bold text-slate-800">Navbar Manager</h1>
                        <p class="text-sm text-slate-500">Manage navigation menu items, logo, and brand name</p>
                    </div>
                    <button onclick="openModal()" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl text-sm shadow-lg shadow-blue-200 transition-all flex items-center gap-2">
                        <i class="fas fa-plus"></i> Add Item
                    </button>
                </div>

                <!-- Logo Settings -->
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-8">
                    <h3 class="font-bold text-slate-800 mb-4">Logo & Branding</h3>
                    <form id="logoForm" class="grid grid-cols-1 md:grid-cols-3 gap-6 items-end">
                        <div class="md:col-span-1">
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Current Logo</label>
                            <div id="logoPreviewWrap" class="h-24 flex items-center justify-center bg-slate-50 rounded-xl border border-slate-200 p-4">
                                <img id="logoPreview" class="max-h-20 w-auto object-contain" alt="Logo preview" />
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Upload New Logo</label>
                            <input type="file" id="logoFile" accept="image/*" class="w-full text-sm text-slate-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700" />
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Logo Height (px)</label>
                            <input type="number" id="logoWidth" min="40" max="200" value="96" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:border-blue-500 outline-none text-sm" />
                            <button type="submit" class="mt-3 w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl text-sm">Save Logo Settings</button>
                        </div>
                    </form>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead>
                                <tr class="bg-slate-50 border-b border-slate-200">
                                    <th class="text-left px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Label</th>
                                    <th class="text-left px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Link</th>
                                    <th class="text-left px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Order</th>
                                    <th class="text-right px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="navTableBody"></tbody>
                        </table>
                    </div>
                    <div id="loadingState" class="p-12 text-center text-slate-400"><i class="fas fa-spinner fa-spin text-2xl"></i><p class="mt-2 text-sm">Loading navigation items...</p></div>
                    <div id="emptyState" class="hidden p-12 text-center text-slate-400"><i class="fas fa-bars text-4xl mb-3"></i><p class="text-sm">No navigation items yet. Click "Add Item" to create one.</p></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Modal -->
    <div id="modal" class="fixed inset-0 z-50 bg-black/50 hidden items-center justify-center p-4" onclick="if(event.target===this)closeModal()">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-8">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-lg font-bold text-slate-800" id="modalTitle">Add Navbar Item</h3>
                <button onclick="closeModal()" class="p-2 hover:bg-slate-100 rounded-lg transition-all"><i class="fas fa-times text-slate-400"></i></button>
            </div>
            <form id="navForm" class="space-y-5">
                <input type="hidden" id="editId" />
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Label <span class="text-red-500">*</span></label>
                    <input type="text" id="label" required class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none text-sm" placeholder="e.g. Home" />
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Link <span class="text-red-500">*</span></label>
                    <input type="text" id="link" required class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none text-sm" placeholder="e.g. /" />
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Sort Order</label>
                    <input type="number" id="order" min="0" value="0" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none text-sm" />
                </div>
                <div class="pt-2 flex gap-3">
                    <button type="button" onclick="closeModal()" class="flex-1 py-3 border border-slate-200 text-slate-600 font-semibold rounded-xl text-sm hover:bg-slate-50 transition-all">Cancel</button>
                    <button type="submit" id="saveBtn" class="flex-1 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl text-sm shadow-lg shadow-blue-200 transition-all">Save Item</button>
                </div>
            </form>
        </div>
    </div>

    <script src="admin-common.js"></script>
    <script>
        const token = initAdminShell('navbar.html');
        const API = ADMIN_API;

        const headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };

        async function loadItems() {
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('navTableBody').innerHTML = '';
            try {
                const res = await fetch(API + '/api/navbar');
                const items = await res.json();
                document.getElementById('loadingState').classList.add('hidden');
                if (!items.length) { document.getElementById('emptyState').classList.remove('hidden'); return; }
                document.getElementById('navTableBody').innerHTML = items.sort((a,b) => (a.sort_order||0) - (b.sort_order||0)).map(item => `
                    <tr class="border-b border-slate-100 hover:bg-slate-50 transition-all">
                        <td class="px-6 py-4 text-sm font-semibold text-slate-700">${item.label}</td>
                        <td class="px-6 py-4 text-sm text-slate-500">${item.link}</td>
                        <td class="px-6 py-4 text-sm text-slate-500">${item.sort_order || 0}</td>
                        <td class="px-6 py-4 text-right">
                            <button onclick="editItem(${item.id})" class="p-2 hover:bg-blue-100 rounded-lg text-slate-400 hover:text-blue-600 transition-all" title="Edit"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteItem(${item.id})" class="p-2 hover:bg-red-100 rounded-lg text-slate-400 hover:text-red-600 transition-all" title="Delete"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                document.getElementById('loadingState').innerHTML = '<p class="text-red-500 text-sm">Failed to load. Make sure the backend server is running on port 5000.</p>';
            }
        }

        function openModal(item) {
            document.getElementById('modalTitle').textContent = item ? 'Edit Navbar Item' : 'Add Navbar Item';
            document.getElementById('editId').value = item ? item.id : '';
            document.getElementById('label').value = item ? item.label : '';
            document.getElementById('link').value = item ? item.link : '';
            document.getElementById('order').value = item ? item.sort_order || 0 : 0;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }

        function editItem(id) {
            fetch(API + '/api/navbar/' + id, { headers: { 'Authorization': 'Bearer ' + token } })
                .then(r => r.json()).then(item => openModal(item));
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('modal').classList.remove('flex');
            document.getElementById('navForm').reset();
        }

        document.getElementById('navForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const body = { label: document.getElementById('label').value, link: document.getElementById('link').value, sort_order: parseInt(document.getElementById('order').value) || 0 };
            const url = id ? API + '/api/navbar/' + id : API + '/api/navbar';
            const method = id ? 'PUT' : 'POST';
            const btn = document.getElementById('saveBtn');
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            try {
                await fetch(url, { method, headers, body: JSON.stringify(body) });
                closeModal(); loadItems();
            } catch (e) { alert('Error saving item'); }
            btn.disabled = false; btn.innerHTML = 'Save Item';
        });

        async function deleteItem(id) {
            if (!confirm('Delete this navigation item?')) return;
            try {
                await fetch(API + '/api/navbar/' + id, { method: 'DELETE', headers });
                loadItems();
            } catch (e) { alert('Error deleting item'); }
        }

        function logout() { localStorage.removeItem('token'); localStorage.removeItem('user'); window.location.href = 'index.html'; }

        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (user.name) { document.getElementById('userName').textContent = user.name; document.getElementById('userEmail').textContent = user.email; document.getElementById('userAvatar').textContent = user.name.charAt(0).toUpperCase(); }

        loadItems();

        async function loadLogo() {
            try {
                const res = await fetch(API + '/api/settings');
                const data = await res.json();
                if (data.logo) document.getElementById('logoPreview').src = API + '/' + data.logo;
                if (data.logo_width) document.getElementById('logoWidth').value = data.logo_width;
            } catch (e) { console.error(e); }
        }

        document.getElementById('logoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('logo_width', document.getElementById('logoWidth').value);
            const file = document.getElementById('logoFile').files[0];
            if (file) formData.append('logo', file);
            try {
                await fetch(API + '/api/settings', { method: 'PUT', headers: { 'Authorization': 'Bearer ' + token }, body: formData });
                loadLogo();
                alert('Logo settings saved!');
            } catch (e) { alert('Error saving logo'); }
        });

        loadLogo();
    </script>
</body>
</html>
