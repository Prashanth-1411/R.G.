<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pages - R.G. Ambulance Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="bg-slate-50 font-sans antialiased">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-slate-900 text-white flex flex-col shrink-0">
            <div class="p-5 border-b border-white/10">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center"><i class="fas fa-ambulance text-white"></i></div>
                    <div><h2 class="font-bold text-sm">R.G. Ambulance</h2><p class="text-[10px] text-slate-400 uppercase tracking-wider">Admin Panel</p></div>
                </div>
            </div>
            <nav id="adminNav" class="flex-1 p-4 space-y-1 overflow-y-auto"></nav>
            <div class="p-4 border-t border-white/10">
                <div class="flex items-center gap-3 px-4 py-3">
                    <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-xs font-bold" id="userAvatar">A</div>
                    <div class="flex-1 min-w-0"><p class="text-sm font-semibold truncate" id="userName">Admin</p><p class="text-[10px] text-slate-400 truncate" id="userEmail"></p></div>
                    <button onclick="adminLogout()" class="p-2 hover:bg-white/10 rounded-lg text-slate-400 hover:text-white transition-all" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto">
            <div class="p-8">
                <div class="flex items-center justify-between mb-8">
                    <div><h1 class="text-2xl font-bold text-slate-800">Pages</h1><p class="text-sm text-slate-500">Manage page headings, banners, and content</p></div>
                    <button onclick="openModal()" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl text-sm shadow-lg shadow-blue-200 transition-all flex items-center gap-2"><i class="fas fa-plus"></i> Add Page</button>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead>
                                <tr class="bg-slate-50 border-b border-slate-200">
                                    <th class="text-left px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Page Name</th>
                                    <th class="text-left px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Heading</th>
                                    <th class="text-right px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="pagesTableBody"></tbody>
                        </table>
                    </div>
                    <div id="loadingState" class="p-12 text-center text-slate-400"><i class="fas fa-spinner fa-spin text-2xl"></i><p class="mt-2 text-sm">Loading pages...</p></div>
                    <div id="emptyState" class="hidden p-12 text-center text-slate-400"><i class="fas fa-file-alt text-4xl mb-3"></i><p class="text-sm">No pages yet. Click "Add Page" to create one.</p></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Modal -->
    <div id="modal" class="fixed inset-0 z-50 bg-black/50 hidden items-center justify-center p-4" onclick="if(event.target===this)closeModal()">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl p-8 max-h-[90vh] overflow-y-auto">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-lg font-bold text-slate-800" id="modalTitle">Add Page</h3>
                <button onclick="closeModal()" class="p-2 hover:bg-slate-100 rounded-lg transition-all"><i class="fas fa-times text-slate-400"></i></button>
            </div>
            <form id="pageForm" class="space-y-5">
                <input type="hidden" id="editId" />
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Page Name (URL slug) <span class="text-red-500">*</span></label>
                    <input type="text" id="page_name" required class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none text-sm" placeholder="e.g. about-us" />
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Heading <span class="text-red-500">*</span></label>
                    <input type="text" id="heading" required class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none text-sm" placeholder="Page heading" />
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Banner Image</label>
                    <input type="file" id="banner_image" accept="image/*" class="w-full text-sm text-slate-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 transition-all" />
                    <div id="bannerPreview" class="hidden mt-3 relative rounded-xl overflow-hidden">
                        <img id="previewBanner" class="w-full h-40 object-cover rounded-xl" />
                        <button type="button" onclick="clearBanner()" class="absolute top-2 right-2 p-1.5 bg-white/90 rounded-lg text-slate-600 hover:bg-white shadow"><i class="fas fa-times text-xs"></i></button>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Content</label>
                    <textarea id="content" rows="8" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none text-sm font-mono" placeholder="Page content (HTML or plain text)"></textarea>
                </div>
                <div class="pt-2 flex gap-3">
                    <button type="button" onclick="closeModal()" class="flex-1 py-3 border border-slate-200 text-slate-600 font-semibold rounded-xl text-sm hover:bg-slate-50 transition-all">Cancel</button>
                    <button type="submit" id="saveBtn" class="flex-1 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl text-sm shadow-lg shadow-blue-200 transition-all">Save Page</button>
                </div>
            </form>
        </div>
    </div>

    <script src="admin-common.js"></script>
    <script>
        const token = initAdminShell('pages.html');
        const API = ADMIN_API;
        const authHeaders = { 'Authorization': 'Bearer ' + token };

        async function loadItems() {
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('pagesTableBody').innerHTML = '';
            try {
                const res = await fetch(API + '/api/pages');
                const items = await res.json();
                document.getElementById('loadingState').classList.add('hidden');
                if (!items.length) { document.getElementById('emptyState').classList.remove('hidden'); return; }
                document.getElementById('pagesTableBody').innerHTML = items.map(item => `
                    <tr class="border-b border-slate-100 hover:bg-slate-50 transition-all">
                        <td class="px-6 py-4 text-sm font-mono text-slate-500">${item.page_name}</td>
                        <td class="px-6 py-4 text-sm font-semibold text-slate-700">${item.heading}</td>
                        <td class="px-6 py-4 text-right">
                            <button onclick="editItem(${item.id})" class="p-2 hover:bg-blue-100 rounded-lg text-slate-400 hover:text-blue-600 transition-all" title="Edit"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteItem(${item.id})" class="p-2 hover:bg-red-100 rounded-lg text-slate-400 hover:text-red-600 transition-all" title="Delete"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                document.getElementById('loadingState').innerHTML = '<p class="text-red-500 text-sm">Failed to load. Make sure the backend server is running on port 5000.</p>';
            }
        }

        function openModal(item) {
            document.getElementById('modalTitle').textContent = item ? 'Edit Page' : 'Add Page';
            document.getElementById('editId').value = item ? item.id : '';
            document.getElementById('page_name').value = item ? item.page_name : '';
            document.getElementById('heading').value = item ? item.heading : '';
            document.getElementById('content').value = item ? (item.content || '') : '';
            document.getElementById('banner_image').value = '';
            document.getElementById('bannerPreview').classList.add('hidden');
            if (item && item.banner_image) {
                document.getElementById('previewBanner').src = API + '/' + item.banner_image;
                document.getElementById('bannerPreview').classList.remove('hidden');
            }
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }

        function editItem(id) {
            fetch(API + '/api/pages/' + id, { headers: authHeaders })
                .then(r => r.json()).then(item => openModal(item));
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('modal').classList.remove('flex');
            document.getElementById('pageForm').reset();
            document.getElementById('bannerPreview').classList.add('hidden');
        }

        function clearBanner() { document.getElementById('bannerPreview').classList.add('hidden'); document.getElementById('banner_image').value = ''; }

        document.getElementById('pageForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const formData = new FormData();
            formData.append('page_name', document.getElementById('page_name').value);
            formData.append('heading', document.getElementById('heading').value);
            formData.append('content', document.getElementById('content').value);
            const fileInput = document.getElementById('banner_image');
            if (fileInput.files[0]) { formData.append('banner_image', fileInput.files[0]); }

            const url = id ? API + '/api/pages/' + id : API + '/api/pages';
            const method = id ? 'PUT' : 'POST';
            const btn = document.getElementById('saveBtn');
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            try {
                await fetch(url, { method, headers: authHeaders, body: formData });
                closeModal(); loadItems();
            } catch (e) { alert('Error saving page'); }
            btn.disabled = false; btn.innerHTML = 'Save Page';
        });

        async function deleteItem(id) {
            if (!confirm('Delete this page?')) return;
            try { await fetch(API + '/api/pages/' + id, { method: 'DELETE', headers: authHeaders }); loadItems(); }
            catch (e) { alert('Error deleting page'); }
        }

        function logout() { adminLogout(); }

        loadItems();
    </script>
</body>
</html>
